<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小圈子聊天</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#f0f2f5}
.chat{height:75vh;overflow-y:auto;padding:15px}
.msg{margin:8px;max-width:75%;padding:10px 14px;border-radius:18px}
.me{background:#007AFF;color:white;margin-left:auto}
.other{background:#fff;margin-right:auto}
.input{display:flex;gap:8px;padding:10px;background:#fff}
#name{width:100px;padding:10px;border:1px solid #ddd;border-radius:8px}
#text{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px}
#send{padding:10px 16px;background:#007AFF;color:white;border:none;border-radius:8px}
</style>
</head>
<body>
<div class="chat" id="box"></div>
<div class="input">
  <input id="name" placeholder="昵称" maxlength="10">
  <input id="text" placeholder="输入消息...">
  <button id="send">发送</button>
</div>

<script>
const box = document.getElementById('box');
const nameInput = document.getElementById('name');
const textInput = document.getElementById('text');
const sendBtn = document.getElementById('send');

function addMsg(data, isMe) {
  const div = document.createElement('div');
  div.className = isMe ? 'msg me' : 'msg other';
  div.textContent = data.name + '：' + data.text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function send() {
  const name = nameInput.value || '匿名';
  const text = textInput.value.trim();
  if (!text) return;

  const data = { name, text };
  addMsg(data, true);
  textInput.value = '';

  localStorage.setItem('chat_last_msg', JSON.stringify(data));
}

sendBtn.onclick = send;
textInput.onkeydown = e => e.key === 'Enter' && send();

window.addEventListener('storage', e => {
  if (e.key === 'chat_last_msg') {
    const data = JSON.parse(e.newValue);
    addMsg(data, false);
  }
});
</script>
</body>
</html>
