<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私密小圈聊天</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#e9e9eb;padding:15px;max-width:700px;margin:0 auto}
.chat{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px #00000015}
.header{background:#4a6cf3;color:white;padding:14px;font-weight:bold}
#messages{height:480px;overflow-y:auto;padding:15px;background:#f7f7f9}
.msg{margin-bottom:10px;max-width:75%;line-height:1.5}
.mine{margin-left:auto;text-align:right}
.other{margin-right:auto}
.bubble{padding:9px 12px;border-radius:15px;display:inline-block}
.mine .bubble{background:#4a6cf3;color:white;border-bottom-right-radius:3px}
.other .bubble{background:#e5e5ea;color:#000;border-bottom-left-radius:3px}
.name{font-size:12px;color:#666;margin-bottom:3px}
.input-area{display:flex;padding:10px;gap:8px;border-top:1px solid #eee}
#name{width:100px;padding:10px;border:1px solid #ddd;border-radius:8px}
#msg{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px}
#send{padding:10px 16px;background:#4a6cf3;color:white;border:none;border-radius:8px}
</style>
</head>

<body>
<div class="chat">
  <div class="header">私密小圈聊天（全世界可聊）</div>
  <div id="messages"></div>
  <div class="input-area">
    <input id="name" placeholder="你的昵称" maxlength="10">
    <input id="msg" placeholder="输入消息…" autocomplete="off">
    <button id="send">发送</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.8.1/dist/socket.io.min.js"></script>
<script>
const messages = document.getElementById('messages');
const nameInput = document.getElementById('name');
const msgInput = document.getElementById('msg');
const sendBtn = document.getElementById('send');

// 连接公共聊天中继（全球可用）
const socket = io('wss://sockets.olix.dev', { transports: ['websocket'] });
const room = 'private_chat_12345'; // 房间号，改数字就是新房间

// 加入房间
socket.emit('join', room);

// 发送消息
function send() {
  const name = nameInput.value || '匿名';
  const content = msgInput.value.trim();
  if (!content) return;
  const data = { name, content, time: new Date().toLocaleTimeString() };
  socket.emit('msg', room, data);
  addMsg(data, true);
  msgInput.value = '';
}

// 显示消息
function addMsg(data, isMe) {
  const div = document.createElement('div');
  div.className = isMe ? 'msg mine' : 'msg other';
  div.innerHTML = `
    <div class="name">${isMe ? '我' : data.name} • ${data.time}</div>
    <div class="bubble">${data.content}</div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

// 监听别人消息
socket.on('msg', data => addMsg(data, false));
sendBtn.onclick = send;
msgInput.onkeydown = e => e.key === 'Enter' && send();
</script>
</body>
</html>
