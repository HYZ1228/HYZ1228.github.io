<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>群聊（无需登录）</title>
<style>
body{margin:0;font-family:system-ui}
.chat{height:85vh;overflow-y:auto;background:#f0f2f5;padding:10px}
.msg{margin:5px;padding:8px 12px;border-radius:16px;max-width:70%}
.you{background:#0084ff;color:white;margin-left:auto}
.other{background:white;margin-right:auto}
.bar{display:flex;gap:5px;padding:8px;background:white}
#name{width:80px;padding:8px;border:1px solid #ddd;border-radius:8px}
#text{flex:1;padding:8px;border:1px solid #ddd;border-radius:8px}
#send{padding:8px 14px;background:#0084ff;color:white;border:none;border-radius:8px}
</style>
</head>
<body>
<div class="chat" id="box"></div>
<div class="bar">
  <input id="name" placeholder="昵称" maxlength="8">
  <input id="text" placeholder="输入消息">
  <button id="send">发送</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.6.1/dist/socket.io.min.js"></script>
<script>
const socket=io("wss://echo.websocket.events",{transports:["websocket"]});
const box=document.getElementById("box");
const name=document.getElementById("name");
const text=document.getElementById("text");
const send=document.getElementById("send");

function sendMsg(){
  const u=name.value||"匿名";
  const t=text.value.trim();
  if(!t)return;
  socket.emit("msg",{user:u,text:t});
  text.value="";
}

socket.on("msg",(d)=>{
  const div=document.createElement("div");
  div.className=d.user===name.value?"msg you":"msg other";
  div.textContent=d.user+": "+d.text;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
});

send.onclick=sendMsg;
text.onkeydown=e=>e.key=="Enter"&&sendMsg();
</script>
</body>
</html>
